  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: #0d1b2a;
      padding: 3rem 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* animated bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(30,80,160,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(80,30,120,0.3) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(10,40,90,0.2) 0%, transparent 70%);
      z-index: 0;
      animation: bgShift 12s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0%   { opacity: 1; }
      100% { opacity: 0.7; }
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 580px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* logo */
    .logo-wrap {
      margin-bottom: 2rem;
      animation: fadeDown 0.7s ease both;
    }
    .logo-wrap img {
      height: 72px;
      width: auto;
      filter: drop-shadow(0 2px 12px rgba(120,180,255,0.3));
    }

    /* subtitle */
    .subtitle {
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 6px;
      text-align: center;
      margin-bottom: 0.5rem;
      animation: fadeDown 0.8s ease 0.1s both;
    }
    .subtitle-en {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 3px;
      color: rgba(160,200,255,0.7);
      text-align: center;
      margin-bottom: 2.5rem;
      text-transform: uppercase;
      animation: fadeDown 0.8s ease 0.2s both;
    }

    /* divider */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(120,180,255,0.5), transparent);
      margin-bottom: 2.5rem;
      animation: fadeIn 1s ease 0.3s both;
    }

    /* grid */
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
    }

    .link-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 1.5rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(120,180,255,0.2);
      border-radius: 16px;
      color: #e8f0ff;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: fadeUp 0.6s ease both;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(60,120,220,0.2), rgba(100,50,180,0.15));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .link-btn:hover {
      transform: translateY(-4px);
      border-color: rgba(120,180,255,0.6);
      background: rgba(255,255,255,0.09);
    }
    .link-btn:hover::before { opacity: 1; }
    .link-btn:active { transform: translateY(-1px) scale(0.98); }

    .link-btn i {
      font-size: 28px;
      background: linear-gradient(135deg, #78b4ff, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .link-btn.full-width {
      grid-column: 1 / -1;
      flex-direction: row;
      gap: 14px;
      padding: 1.3rem 2rem;
    }
    .link-btn.full-width i { font-size: 24px; }

    /* staggered animation */
    .link-btn:nth-child(1) { animation-delay: 0.35s; }
    .link-btn:nth-child(2) { animation-delay: 0.42s; }
    .link-btn:nth-child(3) { animation-delay: 0.49s; }
    .link-btn:nth-child(4) { animation-delay: 0.56s; }
    .link-btn:nth-child(5) { animation-delay: 0.63s; }
    .link-btn:nth-child(6) { animation-delay: 0.70s; }
    .link-btn:nth-child(7) { animation-delay: 0.77s; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 480px) {
      .btn-grid { grid-template-columns: 1fr; }
      .link-btn.full-width { grid-column: 1; }
    }
  </style>
</head>
