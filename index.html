<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시카고 언약 장로 교회 – 온라인 정보 센터</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f5f4f0;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      padding: 2.5rem 1.5rem;
    }

    .church-title {
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 600;
      color: #1a1a1a;
      text-align: center;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .center-subtitle {
      font-size: 16px;
      color: #666;
      text-align: center;
      font-weight: 400;
      margin-bottom: 2rem;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: #c8c4bb;
      border-radius: 2px;
      margin: 0 auto 2.5rem;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
      max-width: 520px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 1.1rem 1rem;
      background: #ffffff;
      border: 1px solid #e0ddd6;
      border-radius: 12px;
      color: #1a1a1a;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      font-family: inherit;
    }

    .link-btn:hover {
      background: #eeecea;
      border-color: #bbb8b0;
    }

    .link-btn:active {
      transform: scale(0.97);
    }

    .link-btn i {
      font-size: 20px;
      color: #888;
      flex-shrink: 0;
    }

    .link-btn.full-width {
      grid-column: 1 / -1;
    }

    /* 모바일: 항상 2열 유지 */
    @media (max-width: 480px) {
      body { padding: 2rem 1rem; }
      .btn-grid {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .link-btn {
        font-size: 13px;
        padding: 1rem 0.5rem;
        gap: 6px;
        border-radius: 10px;
      }
      .link-btn i { font-size: 18px; }
      .link-btn.full-width { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>

  <h1 class="church-title">시카고 언약 장로 교회</h1>
  <p class="center-subtitle">온라인 정보 센터</p>
  <div class="divider"></div>

  <div class="btn-grid">
    <a class="link-btn" href="https://chicagocovenant.org/" target="_blank" rel="noopener">
      <i class="ti ti-world"></i>
      교회 웹사이트
    </a>
    <a class="link-btn" href="https://www.youtube.com/@ccpc-media" target="_blank" rel="noopener">
      <i class="ti ti-brand-youtube"></i>
      교회 YouTube
    </a>

    <a class="link-btn" href="https://glenwercpc-byte.github.io/Church-Calendar/" target="_blank" rel="noopener">
      <i class="ti ti-calendar-event"></i>
      교회 연중 일정표
    </a>
    <a class="link-btn" href="https://glenwercpc-byte.github.io/member-register/" target="_blank" rel="noopener">
      <i class="ti ti-users"></i>
      교인 명부
    </a>

    <a class="link-btn" href="https://glenwercpc-byte.github.io/Cell-Group/" target="_blank" rel="noopener">
      <i class="ti ti-sitemap"></i>
      샘터 조직표
    </a>
    <a class="link-btn" href="https://script.google.com/macros/s/AKfycbxF5ilSTQIL0sk8sOWEQGIn4t69YdcmUgMF8XKn4KXmc6RzuoLgju9z0O_nEshULuRJ6A/exec" target="_blank" rel="noopener">
      <i class="ti ti-report"></i>
      부서장 보고서
    </a>

    <a class="link-btn full-width" href="https://glenwercpc-byte.github.io/Visit/" target="_blank" rel="noopener">
      <i class="ti ti-notebook"></i>
      교인 심방 일지
    </a>
  </div>

</body>
</html>
